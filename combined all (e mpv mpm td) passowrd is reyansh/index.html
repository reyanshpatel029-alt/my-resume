<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFE OS - Immortal Ultimate Version</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* =========================================================
           LIFE OS - GLOBAL DESIGN SYSTEM
           ========================================================= */
        :root {
            --bg-a: #07111f;
            --bg-b: #102a43;
            --bg-c: #213a8f;
            --panel: rgba(255, 255, 255, 0.12);
            --panel-strong: rgba(255, 255, 255, 0.18);
            --panel-soft: rgba(255, 255, 255, 0.08);
            --text: #f7fbff;
            --muted: rgba(247, 251, 255, 0.68);
            --faint: rgba(247, 251, 255, 0.42);
            --border: rgba(255, 255, 255, 0.18);
            --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
            --glow: 0 0 24px rgba(72, 187, 255, 0.38);
            --accent: #44c7ff;
            --accent-2: #77f2c1;
            --accent-3: #ffd166;
            --danger: #ff6680;
            --warning: #ffbf5f;
            --ok: #6ff0a8;
            --radius: 18px;
            --radius-sm: 10px;
            --sidebar-w: 236px;
            --subbar-w: 220px;
            --topbar-h: 76px;
            --speed: 180ms;
            color-scheme: dark;
        }

        [data-theme="light"] {
            --bg-a: #eef7ff;
            --bg-b: #d7f2ef;
            --bg-c: #dbe5ff;
            --panel: rgba(255, 255, 255, 0.62);
            --panel-strong: rgba(255, 255, 255, 0.78);
            --panel-soft: rgba(255, 255, 255, 0.38);
            --text: #102033;
            --muted: rgba(16, 32, 51, 0.68);
            --faint: rgba(16, 32, 51, 0.44);
            --border: rgba(16, 32, 51, 0.13);
            --shadow: 0 24px 70px rgba(39, 82, 130, 0.18);
            --glow: 0 0 24px rgba(23, 132, 255, 0.18);
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 12% 8%, rgba(68, 199, 255, 0.26), transparent 28rem),
                radial-gradient(circle at 84% 12%, rgba(119, 242, 193, 0.2), transparent 24rem),
                radial-gradient(circle at 50% 96%, rgba(255, 209, 102, 0.16), transparent 28rem),
                linear-gradient(135deg, var(--bg-a), var(--bg-b) 54%, var(--bg-c));
            color: var(--text);
            overflow-x: hidden;
            transition: background var(--speed), color var(--speed);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 85%);
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        input,
        select,
        textarea {
            width: 100%;
            color: var(--text);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 13px;
            outline: none;
            transition: border var(--speed), background var(--speed), box-shadow var(--speed);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        input:focus,
        select:focus,
        textarea:focus,
        .editor:focus {
            border-color: rgba(68, 199, 255, 0.65);
            box-shadow: var(--glow);
            background: rgba(255, 255, 255, 0.14);
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--faint);
        }

        a {
            color: inherit;
        }

        .hidden {
            display: none !important;
        }

        .muted {
            color: var(--muted);
        }

        .tiny {
            color: var(--faint);
            font-size: 0.78rem;
        }

        .app-loader {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: grid;
            place-items: center;
            background: rgba(5, 10, 18, 0.7);
            backdrop-filter: blur(20px);
        }

        .loader-card {
            display: grid;
            gap: 16px;
            width: min(360px, calc(100vw - 32px));
            padding: 26px;
            border: 1px solid var(--border);
            border-radius: 22px;
            background: var(--panel);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .loader-ring {
            width: 72px;
            height: 72px;
            margin: 0 auto;
            border: 4px solid rgba(255, 255, 255, 0.14);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            10%, 90% { transform: translateX(-1px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-5px); }
            40%, 60% { transform: translateX(5px); }
        }

        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }

        /* =========================================================
           AUTHENTICATION SCREEN
           ========================================================= */
        .auth-screen {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-card {
            width: min(440px, 100%);
            padding: 30px;
            border: 1px solid var(--border);
            border-radius: 26px;
            background: var(--panel);
            backdrop-filter: blur(26px);
            box-shadow: var(--shadow);
            animation: fadeUp 420ms ease both;
        }

        .brand-mark {
            display: inline-grid;
            place-items: center;
            width: 52px;
            height: 52px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #06111d;
            box-shadow: var(--glow);
            margin-bottom: 18px;
        }

        .auth-card h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 8vw, 3.25rem);
            letter-spacing: 0;
        }

        .auth-card p {
            margin: 0 0 22px;
            color: var(--muted);
            line-height: 1.55;
        }

        .auth-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            margin: 12px 0 18px;
        }

        .checkline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .checkline input {
            width: auto;
        }

        .auth-error {
            min-height: 24px;
            margin-top: 12px;
            color: var(--danger);
            font-weight: 700;
        }

        .shake {
            animation: shake 420ms cubic-bezier(.36,.07,.19,.97) both;
        }

        /* =========================================================
           LAYOUT
           ========================================================= */
        .app-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: var(--sidebar-w) var(--subbar-w) minmax(0, 1fr);
            gap: 14px;
            padding: 14px;
        }

        .sidebar,
        .sub-sidebar,
        .topbar,
        .glass,
        .modal-card,
        .quick-panel,
        .notification-center {
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(24px);
            box-shadow: var(--shadow);
        }

        .sidebar,
        .sub-sidebar {
            position: sticky;
            top: 14px;
            height: calc(100vh - 28px);
            border-radius: 24px;
            overflow: hidden;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
        }

        .sidebar-head {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 8px 8px 14px;
        }

        .logo {
            display: grid;
            place-items: center;
            min-width: 42px;
            width: 42px;
            height: 42px;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #06111d;
            box-shadow: var(--glow);
        }

        .brand-title {
            font-weight: 900;
            line-height: 1.05;
        }

        .brand-subtitle {
            color: var(--faint);
            font-size: 0.72rem;
            margin-top: 3px;
        }

        .collapse-btn {
            margin-left: auto;
            min-width: 34px;
            width: 34px;
            height: 34px;
        }

        .nav-scroll {
            overflow-y: auto;
            padding-right: 4px;
        }

        .nav-scroll::-webkit-scrollbar,
        .content-shell::-webkit-scrollbar,
        .sub-scroll::-webkit-scrollbar {
            width: 7px;
        }

        .nav-scroll::-webkit-scrollbar-thumb,
        .content-shell::-webkit-scrollbar-thumb,
        .sub-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.18);
            border-radius: 999px;
        }

        .nav-btn,
        .sub-btn,
        .icon-btn,
        .pill-btn,
        .primary-btn,
        .ghost-btn,
        .danger-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            min-height: 40px;
            border-radius: 12px;
            color: var(--text);
            transition: transform var(--speed), background var(--speed), box-shadow var(--speed), border var(--speed);
        }

        .nav-btn,
        .sub-btn {
            width: 100%;
            justify-content: flex-start;
            padding: 11px 12px;
            margin: 3px 0;
            background: transparent;
            color: var(--muted);
        }

        .nav-btn:hover,
        .sub-btn:hover,
        .nav-btn.active,
        .sub-btn.active {
            color: var(--text);
            background: var(--panel-strong);
            transform: translateX(3px);
        }

        .nav-btn.active,
        .sub-btn.active {
            box-shadow: inset 0 0 0 1px rgba(68, 199, 255, 0.3), var(--glow);
        }

        .sub-sidebar {
            padding: 18px;
        }

        .sub-title {
            margin: 0 0 4px;
            font-size: 1rem;
        }

        .sub-desc {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.45;
            font-size: 0.86rem;
        }

        .sub-scroll {
            max-height: calc(100vh - 132px);
            overflow-y: auto;
            padding-right: 4px;
        }

        .workspace {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .topbar {
            position: sticky;
            top: 14px;
            z-index: 25;
            min-height: var(--topbar-h);
            border-radius: 24px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mobile-menu {
            display: none;
        }

        .page-heading {
            min-width: 168px;
        }

        .page-heading h2 {
            margin: 0;
            font-size: clamp(1.2rem, 2vw, 1.55rem);
        }

        .page-heading span {
            color: var(--faint);
            font-size: 0.78rem;
        }

        .global-search {
            position: relative;
            flex: 1;
            min-width: 160px;
        }

        .global-search i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--faint);
        }

        .global-search input {
            padding-left: 39px;
        }

        .search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            z-index: 40;
            max-height: 360px;
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(10, 22, 35, 0.92);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            padding: 8px;
        }

        [data-theme="light"] .search-results {
            background: rgba(255, 255, 255, 0.94);
        }

        .search-item {
            width: 100%;
            justify-content: flex-start;
            padding: 10px;
            border-radius: 10px;
            background: transparent;
            color: var(--text);
            text-align: left;
        }

        .content-shell {
            overflow-y: auto;
            height: calc(100vh - 104px);
            padding: 2px 2px 42px;
            animation: fadeUp 220ms ease both;
        }

        .sidebar-collapsed {
            --sidebar-w: 82px;
        }

        .sidebar-collapsed .brand-copy,
        .sidebar-collapsed .nav-label {
            display: none;
        }

        .sidebar-collapsed .nav-btn {
            justify-content: center;
        }

        /* =========================================================
           COMPONENTS
           ========================================================= */
        .grid {
            display: grid;
            gap: 14px;
        }

        .grid.two {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid.three {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .grid.four {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .grid.auto {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--panel);
            backdrop-filter: blur(20px);
            padding: 16px;
            box-shadow: 0 16px 38px rgba(0, 0, 0, 0.15);
            transition: transform var(--speed), border var(--speed), background var(--speed);
            animation: fadeUp 260ms ease both;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(68, 199, 255, 0.34);
            background: var(--panel-strong);
        }

        .card-head,
        .row,
        .between {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .between {
            justify-content: space-between;
        }

        .card-head {
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .card h3 {
            margin: 0;
            font-size: 1rem;
        }

        .metric {
            max-width: 100%;
            overflow-wrap: anywhere;
            font-size: clamp(1.35rem, 2.4vw, 2.3rem);
            font-weight: 900;
            letter-spacing: 0;
            line-height: 1.08;
        }

        .metric.small {
            font-size: 1.45rem;
        }

        .chip,
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
            min-height: 28px;
            padding: 5px 9px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--muted);
            border: 1px solid var(--border);
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .tag.ok { color: var(--ok); }
        .tag.warn { color: var(--warning); }
        .tag.danger { color: var(--danger); }
        .tag.accent { color: var(--accent); }

        .icon-btn,
        .pill-btn,
        .ghost-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
        }

        .icon-btn {
            min-width: 40px;
            width: 40px;
            height: 40px;
            padding: 0;
        }

        .pill-btn,
        .primary-btn,
        .ghost-btn,
        .danger-btn {
            padding: 0 13px;
            min-width: 0;
        }

        .primary-btn {
            color: #06111d;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: var(--glow);
            font-weight: 800;
        }

        .danger-btn {
            color: #fff;
            background: linear-gradient(135deg, #ff6680, #ff8c66);
            box-shadow: 0 0 24px rgba(255, 102, 128, 0.3);
        }

        .icon-btn:hover,
        .pill-btn:hover,
        .primary-btn:hover,
        .ghost-btn:hover,
        .danger-btn:hover {
            transform: translateY(-1px);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .form-grid .full {
            grid-column: 1 / -1;
        }

        .list {
            display: grid;
            gap: 9px;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
        }

        .list-main {
            min-width: 0;
        }

        .list-main strong,
        .truncate {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        table {
            width: 100%;
            min-width: 720px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 0.78rem;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .progress {
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
        }

        .progress span {
            display: block;
            height: 100%;
            width: var(--w, 0%);
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
        }

        .skeleton {
            position: relative;
            overflow: hidden;
            min-height: 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
        }

        .skeleton::after {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            animation: shimmer 1.3s infinite;
        }

        .empty {
            min-height: 160px;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            padding: 24px;
        }

        .empty i {
            display: block;
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .fab {
            position: fixed;
            right: 22px;
            bottom: 22px;
            z-index: 34;
            width: 58px;
            height: 58px;
            border-radius: 22px;
            color: #06111d;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: var(--glow), var(--shadow);
        }

        .modal-root,
        .focus-overlay {
            position: fixed;
            inset: 0;
            z-index: 70;
            display: none;
            place-items: center;
            padding: 18px;
            background: rgba(0, 0, 0, 0.48);
            backdrop-filter: blur(14px);
        }

        .modal-root.active,
        .focus-overlay.active {
            display: grid;
        }

        .modal-card {
            width: min(720px, 100%);
            max-height: calc(100vh - 36px);
            overflow: auto;
            border-radius: 24px;
            padding: 18px;
        }

        .toast-root {
            position: fixed;
            z-index: 90;
            top: 18px;
            right: 18px;
            display: grid;
            gap: 10px;
            width: min(360px, calc(100vw - 36px));
        }

        .toast {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(10, 22, 35, 0.88);
            backdrop-filter: blur(20px);
            color: var(--text);
            box-shadow: var(--shadow);
            padding: 12px;
            animation: fadeUp 220ms ease both;
        }

        [data-theme="light"] .toast {
            background: rgba(255, 255, 255, 0.92);
        }

        .quick-panel,
        .notification-center {
            position: fixed;
            top: 96px;
            right: 18px;
            z-index: 45;
            width: min(360px, calc(100vw - 36px));
            border-radius: 22px;
            padding: 16px;
            transform: translateX(calc(100% + 28px));
            transition: transform 260ms ease;
        }

        .quick-panel.open,
        .notification-center.open {
            transform: translateX(0);
        }

        .notification-center {
            top: 168px;
        }

        .kbd {
            display: inline-grid;
            place-items: center;
            min-width: 26px;
            height: 24px;
            padding: 0 6px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.12);
            color: var(--muted);
            font-size: 0.76rem;
        }

        /* =========================================================
           MODULE-SPECIFIC SURFACES
           ========================================================= */
        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
        }

        .folder-card,
        .file-card,
        .note-card {
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            padding: 13px;
            min-height: 132px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
            transition: transform var(--speed), border var(--speed);
        }

        .folder-card:hover,
        .file-card:hover,
        .note-card:hover {
            transform: translateY(-2px);
            border-color: rgba(68, 199, 255, 0.32);
        }

        .folder-icon,
        .file-icon {
            width: 46px;
            height: 46px;
            border-radius: 15px;
            display: grid;
            place-items: center;
            color: #06111d;
            background: var(--folder-color, linear-gradient(135deg, var(--accent), var(--accent-2)));
        }

        .drop-zone {
            border: 1px dashed rgba(68, 199, 255, 0.55);
            border-radius: 18px;
            min-height: 124px;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 20px;
            background: rgba(68, 199, 255, 0.08);
        }

        .drop-zone.drag {
            background: rgba(68, 199, 255, 0.18);
            box-shadow: var(--glow);
        }

        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 10px;
        }

        .editor {
            min-height: 320px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            line-height: 1.65;
        }

        .task-complete {
            opacity: 0.62;
            text-decoration: line-through;
        }

        .pomodoro-time,
        .clock-time {
            font-size: clamp(2.2rem, 6vw, 5rem);
            font-weight: 900;
            letter-spacing: 0;
            text-align: center;
            line-height: 1;
            white-space: nowrap;
        }

        .dashboard-clock-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 14px;
        }

        .dashboard-clock-card .clock-time {
            text-align: left;
            font-size: clamp(2.2rem, 5.4vw, 4.8rem);
        }

        .dashboard-clock-meta {
            display: grid;
            gap: 8px;
            justify-items: end;
            text-align: right;
        }

        .analog-clock {
            position: relative;
            width: min(260px, 74vw);
            aspect-ratio: 1;
            margin: 0 auto;
            border: 1px solid var(--border);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.08);
        }

        .hand {
            position: absolute;
            left: 50%;
            bottom: 50%;
            width: 4px;
            transform-origin: bottom;
            border-radius: 999px;
            background: var(--accent);
        }

        .hand.hour { height: 28%; }
        .hand.minute { height: 38%; background: var(--accent-2); }
        .hand.second { height: 44%; width: 2px; background: var(--danger); }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 8px;
        }

        .calendar-cell {
            min-height: 112px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 9px;
            background: rgba(255, 255, 255, 0.07);
        }

        .calendar-cell.today {
            box-shadow: inset 0 0 0 1px var(--accent), var(--glow);
        }

        .timetable-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(180px, 1fr));
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .day-column {
            min-height: 280px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.07);
            padding: 10px;
        }

        .class-card {
            border-radius: 12px;
            padding: 10px;
            margin: 8px 0;
            background: var(--class-color, rgba(68,199,255,0.2));
            border: 1px solid rgba(255, 255, 255, 0.16);
            cursor: grab;
        }

        .drawing-board {
            width: 100%;
            max-width: 820px;
            height: 360px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: #ffffff;
            touch-action: none;
        }

        .focus-overlay .modal-card {
            text-align: center;
            width: min(620px, 100%);
        }

        /* =========================================================
           RESPONSIVE DESIGN
           ========================================================= */
        @media (max-width: 1180px) {
            .app-shell {
                grid-template-columns: 86px minmax(180px, 210px) minmax(0, 1fr);
            }
            .brand-copy,
            .nav-label {
                display: none;
            }
            .nav-btn {
                justify-content: center;
            }
            .collapse-btn {
                display: none;
            }
        }

        @media (max-width: 920px) {
            .app-shell {
                grid-template-columns: 1fr;
                padding: 10px;
            }
            .sidebar,
            .sub-sidebar {
                position: fixed;
                z-index: 50;
                top: 10px;
                bottom: 10px;
                height: auto;
                transform: translateX(-120%);
                transition: transform 240ms ease;
            }
            .sidebar {
                left: 10px;
                width: min(284px, calc(100vw - 20px));
            }
            .sub-sidebar {
                left: 10px;
                width: min(284px, calc(100vw - 20px));
                top: auto;
                height: min(68vh, 560px);
            }
            .sidebar.open,
            .sub-sidebar.open {
                transform: translateX(0);
            }
            .brand-copy,
            .nav-label {
                display: block;
            }
            .nav-btn {
                justify-content: flex-start;
            }
            .mobile-menu {
                display: inline-flex;
            }
            .topbar {
                top: 10px;
                flex-wrap: wrap;
            }
            .page-heading {
                flex: 1;
                min-width: 150px;
            }
            .global-search {
                flex-basis: 100%;
                order: 4;
            }
            .content-shell {
                height: auto;
                min-height: calc(100vh - 104px);
            }
            .grid.two,
            .grid.three,
            .grid.four {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .auth-card {
                padding: 22px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 14px;
            }
            .topbar {
                border-radius: 18px;
            }
            .calendar {
                grid-template-columns: 1fr;
            }
            .dashboard-clock-card {
                align-items: flex-start;
                flex-direction: column;
            }
            .dashboard-clock-meta {
                justify-items: start;
                text-align: left;
            }
        }
    </style>
</head>

    <script>
        /* =========================================================
           LIFE OS - STATE, HELPERS, AND DEFAULT DATA
           ========================================================= */
        const STORAGE_KEY = "lifeos_immortal_v1";
        const SESSION_KEY = "lifeos_session_v1";
        const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        const QUOTES = [
            "Small consistent wins compound into a completely different life.",
            "Your future self is built in the quiet minutes nobody sees.",
            "Clarity first. Momentum second. Magic after that.",
            "Study like your attention is a rare resource, because it is.",
            "The dashboard is not the work. It is the runway."
        ];
        const MENU = [
            { id: "dashboard", icon: "fa-house", label: "Dashboard", desc: "Your daily command center", subs: ["Overview", "Today", "Shortcuts"] },
            { id: "expenses", icon: "fa-wallet", label: "Expense Manager", desc: "Budget, income, spending, and goals", subs: ["Add Expense", "Expense History", "Budget", "Savings Goals", "Expense Analytics"] },
            { id: "vault", icon: "fa-folder-open", label: "Personal Vault", desc: "Files, folders, favorites, and downloads", subs: ["Documents", "Images", "Notes", "Favorites", "Downloads"] },
            { id: "notes", icon: "fa-note-sticky", label: "Notes", desc: "Rich notes, voice notes, and drawing", subs: ["All Notes", "Editor", "Favorites", "Voice Notes", "Drawing Canvas"] },
            { id: "tasks", icon: "fa-square-check", label: "Task Manager", desc: "Tasks, goals, priorities, and recurring work", subs: ["Today", "All Tasks", "Daily Goals", "Weekly Goals", "Recurring"] },
            { id: "productivity", icon: "fa-chart-line", label: "Productivity Manager", desc: "Pomodoro, habits, goals, and badges", subs: ["Pomodoro", "Focus Mode", "Habit Tracker", "Goal Tracker", "Achievements"] },
            { id: "clock", icon: "fa-clock", label: "Clock Utilities", desc: "Clocks, stopwatch, alarms, and timer", subs: ["Digital Clock", "Stopwatch", "Alarm", "Timer", "World Clock"] },
            { id: "planner", icon: "fa-calendar-days", label: "Planner & Timetable", desc: "Calendar, events, deadlines, and classes", subs: ["Daily Planner", "Weekly Planner", "Calendar", "Events", "Timetable"] },
            { id: "analytics", icon: "fa-chart-pie", label: "Analytics", desc: "Life, productivity, expense, and storage insights", subs: ["Overview", "Productivity", "Expenses", "Tasks", "Storage"] },
            { id: "recycle", icon: "fa-recycle", label: "Recycle Bin", desc: "Restore or permanently delete removed items", subs: ["Deleted Items", "Restore Center", "Recently Deleted"] },
            { id: "settings", icon: "fa-gear", label: "Settings", desc: "Theme, password, backup, and reset", subs: ["Theme", "Password", "Notifications", "Backup", "Reset"] }
        ];

        let state;
        let ui = {
            section: "dashboard",
            sub: "Overview",
            selectedNote: null,
            selectedFolder: "root",
            expenseQuery: "",
            expenseType: "all",
            taskQuery: "",
            taskFilter: "all",
            timerMode: "focus",
            timerSeconds: 25 * 60,
            timerRunning: false,
            stopwatchSeconds: 0,
            stopwatchRunning: false,
            countdownSeconds: 5 * 60,
            countdownRunning: false,
            drawing: false
        };
        let charts = {};
        let intervals = {};
        let inactivityTimer = null;

        const $ = (selector, root = document) => root.querySelector(selector);
        const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
        const byId = id => document.getElementById(id);
        const uid = prefix => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
        const today = () => new Date().toISOString().slice(0, 10);
        const nowIso = () => new Date().toISOString();
        const fmtDate = value => value ? new Date(value).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "No date";
        const fmtTime = value => new Date(value).toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
        const money = value => Number(value || 0).toLocaleString(undefined, { style: "currency", currency: "USD" });
        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
        const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));

        state = loadState();

        function defaultState() {
            const todayKey = today();
            return {
                auth: {
                    passwordHash: "",
                    pinHash: "",
                    remember: false,
                    pinEnabled: false
                },
                settings: {
                    theme: "dark",
                    autoLockMinutes: 15,
                    notifications: true,
                    monthlyBudget: 500,
                    currency: "USD"
                },
                notifications: [],
                expenses: [
                    { id: uid("txn"), type: "income", title: "Scholarship", amount: 250, category: "Education", date: todayKey, note: "Monthly student income", createdAt: nowIso() },
                    { id: uid("txn"), type: "expense", title: "Books", amount: 42, category: "Study", date: todayKey, note: "Reference material", createdAt: nowIso() },
                    { id: uid("txn"), type: "expense", title: "Lunch", amount: 12, category: "Food", date: todayKey, note: "Campus cafeteria", createdAt: nowIso() }
                ],
                savingsGoals: [
                    { id: uid("goal"), title: "New Laptop Fund", target: 1200, saved: 280, deadline: "", color: "#44c7ff" }
                ],
                folders: [
                    { id: "root", parentId: null, name: "My Vault", color: "linear-gradient(135deg,#44c7ff,#77f2c1)", favorite: false, pinned: true, locked: false, createdAt: nowIso() },
                    { id: uid("folder"), parentId: "root", name: "Documents", color: "linear-gradient(135deg,#ffd166,#ff8c66)", favorite: true, pinned: true, locked: false, createdAt: nowIso() },
                    { id: uid("folder"), parentId: "root", name: "Private", color: "linear-gradient(135deg,#ff6680,#9f7aea)", favorite: false, pinned: false, locked: true, createdAt: nowIso() }
                ],
                files: [],
                notes: [
                    { id: uid("note"), title: "Welcome to LIFE OS", content: "<h2>Your workspace is alive.</h2><p>Use notes, tasks, vault files, expenses, planner, and analytics from one single local file.</p>", tags: ["home", "system"], favorite: true, pinned: true, updatedAt: nowIso(), createdAt: nowIso() }
                ],
                tasks: [
                    { id: uid("task"), title: "Review today timetable", category: "Study", priority: "High", due: todayKey, completed: false, recurring: "None", goal: "Daily", createdAt: nowIso() },
                    { id: uid("task"), title: "Log expenses", category: "Personal", priority: "Medium", due: todayKey, completed: false, recurring: "Daily", goal: "Daily", createdAt: nowIso() },
                    { id: uid("task"), title: "Read 20 pages", category: "Study", priority: "High", due: todayKey, completed: true, recurring: "None", goal: "Weekly", createdAt: nowIso() }
                ],
                habits: [
                    { id: uid("habit"), title: "Deep Study", color: "#44c7ff", history: { [todayKey]: true } },
                    { id: uid("habit"), title: "Exercise", color: "#77f2c1", history: {} }
                ],
                productivityGoals: [
                    { id: uid("prodgoal"), title: "Focus Hours", target: 20, progress: 4, unit: "hours" }
                ],
                focusSessions: [
                    { id: uid("focus"), minutes: 25, date: todayKey, label: "Seed focus session" }
                ],
                events: [
                    { id: uid("event"), title: "Assignment deadline", date: todayKey, time: "18:00", type: "Deadline", note: "Submit before dinner." }
                ],
                timetable: [
                    { id: uid("class"), day: currentDayName(), subject: "Mathematics", start: "09:00", end: "10:00", room: "A-204", teacher: "Dr. Rao", color: "rgba(68,199,255,0.24)" },
                    { id: uid("class"), day: currentDayName(), subject: "Physics Lab", start: "11:00", end: "12:30", room: "Lab 3", teacher: "Prof. Mehta", color: "rgba(119,242,193,0.24)" }
                ],
                recycle: []
            };
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return defaultState();
                const parsed = JSON.parse(raw);
                return mergeState(defaultState(), parsed);
            } catch (error) {
                console.warn("State load failed", error);
                return defaultState();
            }
        }

        function mergeState(base, incoming) {
            const output = { ...base, ...incoming };
            output.auth = { ...base.auth, ...(incoming.auth || {}) };
            output.settings = { ...base.settings, ...(incoming.settings || {}) };
            for (const key of ["notifications", "expenses", "savingsGoals", "folders", "files", "notes", "tasks", "habits", "productivityGoals", "focusSessions", "events", "timetable", "recycle"]) {
                output[key] = Array.isArray(incoming[key]) ? incoming[key] : base[key];
            }
            return output;
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (error) {
                toast("Storage is full. Export a backup or remove large files.", "error");
            }
        }

        async function hashText(text) {
            if (window.crypto && crypto.subtle) {
                const encoded = new TextEncoder().encode(text);
                const buffer = await crypto.subtle.digest("SHA-256", encoded);
                return Array.from(new Uint8Array(buffer)).map(byte => byte.toString(16).padStart(2, "0")).join("");
            }
            return btoa(unescape(encodeURIComponent(text))).split("").reverse().join("");
        }

        function currentDayName() {
            const day = new Date().getDay();
            return ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][day];
        }

        function itemById(collection, id) {
            return state[collection].find(item => item.id === id);
        }

        /* =========================================================
           APP BOOT, AUTH, AND SESSION LOCKING
           ========================================================= */
        document.addEventListener("DOMContentLoaded", init);

        function init() {
            document.body.dataset.theme = state.settings.theme;
            setupAuthScreen();
            attachEventHandlers();
            setTimeout(() => {
                byId("loader").classList.add("hidden");
                const session = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null");
                if (state.auth.passwordHash && state.auth.remember && session?.unlocked) {
                    unlockApp(false);
                } else {
                    showAuth();
                }
            }, 450);
        }

        function showAuth(message = "") {
            byId("app").classList.add("hidden");
            byId("fab").classList.add("hidden");
            byId("authScreen").classList.remove("hidden");
            byId("authError").textContent = message;
            setupAuthScreen();
            stopIntervals();
        }

        function setupAuthScreen() {
            const firstRun = !state.auth.passwordHash;
            byId("authHint").textContent = firstRun ? "Create a private password to protect your personal workspace." : "Enter your password to unlock your life dashboard.";
            byId("authSubmit").textContent = firstRun ? "Create Password" : "Unlock Dashboard";
            byId("confirmWrap").classList.toggle("hidden", !firstRun);
            byId("rememberInput").checked = !!state.auth.remember;
            byId("passwordInput").value = "";
            byId("confirmInput").value = "";
        }

        async function handleAuthSubmit(event) {
            event.preventDefault();
            const firstRun = !state.auth.passwordHash;
            const password = byId("passwordInput").value.trim();
            const confirm = byId("confirmInput").value.trim();
            const remember = byId("rememberInput").checked;
            byId("authError").textContent = "";
            if (password.length < 4) return authFail("Use at least 4 characters.");
            if (firstRun) {
                if (password !== confirm) return authFail("Passwords do not match.");
                state.auth.passwordHash = await hashText(password);
                state.auth.remember = remember;
                saveState();
                toast("Password created. Welcome to LIFE OS.", "success");
                unlockApp(remember);
                return;
            }
            const hash = await hashText(password);
            if (hash !== state.auth.passwordHash) return authFail("Incorrect Password");
            state.auth.remember = remember;
            saveState();
            unlockApp(remember);
        }

        function authFail(message) {
            byId("authError").textContent = message;
            const card = $(".auth-card");
            card.classList.remove("shake");
            void card.offsetWidth;
            card.classList.add("shake");
        }

        function unlockApp(remember) {
            sessionStorage.setItem(SESSION_KEY, JSON.stringify({ unlocked: true, at: nowIso() }));
            byId("authScreen").classList.add("hidden");
            byId("app").classList.remove("hidden");
            byId("fab").classList.remove("hidden");
            renderApp();
            startIntervals();
            resetInactivityTimer();
            if (remember) toast("Remember me enabled for this browser session.", "success");
        }

        function lockApp() {
            sessionStorage.removeItem(SESSION_KEY);
            showAuth("Workspace locked.");
        }

        function logout() {
            sessionStorage.removeItem(SESSION_KEY);
            toast("Logged out securely.", "success");
            showAuth();
        }

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            const minutes = Number(state.settings.autoLockMinutes || 0);
            if (!minutes) return;
            inactivityTimer = setTimeout(() => {
                toast("Auto-lock activated after inactivity.", "warning");
                lockApp();
            }, minutes * 60 * 1000);
        }

        /* =========================================================
           GLOBAL EVENTS AND KEYBOARD SHORTCUTS
           ========================================================= */
        function attachEventHandlers() {
            byId("authForm").addEventListener("submit", handleAuthSubmit);
            byId("showPasswordInput").addEventListener("change", event => {
                const type = event.target.checked ? "text" : "password";
                byId("passwordInput").type = type;
                byId("confirmInput").type = type;
            });
            document.addEventListener("click", handleAction);
            document.addEventListener("input", handleInput);
            document.addEventListener("change", handleChange);
            document.addEventListener("submit", handleSubmit);
            document.addEventListener("keydown", handleKeyboard);
            ["mousemove", "keydown", "click", "touchstart"].forEach(event => document.addEventListener(event, resetInactivityTimer, { passive: true }));
            byId("vaultUploader").addEventListener("change", event => uploadFiles(event.target.files));
            byId("restoreInput").addEventListener("change", restoreBackupFile);
        }

        async function handleAction(event) {
            const target = event.target.closest("[data-action]");
            if (!target) return;
            const action = target.dataset.action;
            const id = target.dataset.id;
            const collection = target.dataset.collection;
            if (action === "switch-section") switchSection(target.dataset.section);
            if (action === "switch-sub") switchSub(target.dataset.sub);
            if (action === "toggle-sidebar") document.body.classList.toggle("sidebar-collapsed");
            if (action === "toggle-mobile-main") byId("mainSidebar").classList.toggle("open");
            if (action === "toggle-mobile-sub") byId("subSidebar").classList.toggle("open");
            if (action === "toggle-theme") toggleTheme();
            if (action === "toggle-quick") byId("quickPanel").classList.toggle("open");
            if (action === "toggle-notifications") toggleNotificationCenter();
            if (action === "logout") logout();
            if (action === "lock-now") lockApp();
            if (action === "open-quick-create") openQuickCreate();
            if (action === "quick-note") quickNote();
            if (action === "quick-task") quickTask();
            if (action === "quick-expense") quickExpense();
            if (action === "edit-expense") openExpenseModal(id);
            if (action === "delete-expense") softDelete("expenses", id, "Expense deleted.");
            if (action === "export-expenses") exportExpenses();
            if (action === "delete-goal") softDelete("savingsGoals", id, "Savings goal deleted.");
            if (action === "open-folder") openFolder(id);
            if (action === "new-folder") openFolderModal();
            if (action === "rename-folder") openFolderModal(id);
            if (action === "delete-folder") deleteFolder(id);
            if (action === "toggle-folder-prop") toggleFolderProp(id, target.dataset.prop);
            if (action === "upload-files") byId("vaultUploader").click();
            if (action === "preview-file") previewFile(id);
            if (action === "download-file") downloadFile(id);
            if (action === "delete-file") softDelete("files", id, "File moved to recycle bin.");
            if (action === "new-note") createNote();
            if (action === "select-note") selectNote(id);
            if (action === "delete-note") softDelete("notes", id, "Note moved to recycle bin.");
            if (action === "toggle-note-prop") toggleNoteProp(id, target.dataset.prop);
            if (action === "format-note") formatNote(target.dataset.command, target.dataset.value);
            if (action === "voice-note") startVoiceNote();
            if (action === "clear-drawing") clearDrawing();
            if (action === "save-drawing") saveDrawingToNote();
            if (action === "toggle-task") toggleTask(id);
            if (action === "edit-task") openTaskModal(id);
            if (action === "delete-task") softDelete("tasks", id, "Task moved to recycle bin.");
            if (action === "pomodoro-mode") setPomodoroMode(target.dataset.mode);
            if (action === "pomodoro-toggle") togglePomodoro();
            if (action === "pomodoro-reset") resetPomodoro();
            if (action === "toggle-habit") toggleHabit(id);
            if (action === "delete-habit") removeItem("habits", id, "Habit deleted.");
            if (action === "delete-prod-goal") removeItem("productivityGoals", id, "Goal deleted.");
            if (action === "goal-progress") changeGoalProgress(id, Number(target.dataset.delta || 0));
            if (action === "focus-mode") showFocusMode();
            if (action === "close-focus") byId("focusOverlay").classList.remove("active");
            if (action === "stopwatch-toggle") ui.stopwatchRunning = !ui.stopwatchRunning;
            if (action === "stopwatch-reset") ui.stopwatchSeconds = 0;
            if (action === "timer-toggle") ui.countdownRunning = !ui.countdownRunning;
            if (action === "timer-reset") resetCountdown();
            if (action === "delete-alarm") removeItem("alarms", id, "Alarm deleted.");
            if (action === "delete-event") softDelete("events", id, "Event moved to recycle bin.");
            if (action === "edit-event") openEventModal(id);
            if (action === "edit-class") openClassModal(id);
            if (action === "delete-class") removeItem("timetable", id, "Class deleted.");
            if (action === "restore-item") restoreItem(id);
            if (action === "permanent-delete") permanentDelete(id);
            if (action === "empty-recycle") emptyRecycle();
            if (action === "export-backup") exportBackup();
            if (action === "restore-backup") byId("restoreInput").click();
            if (action === "reset-app") resetApp();
            if (action === "close-modal") closeModal();
            if (action === "search-open") openSearchResult(id);
            if (action === "clear-notifications") clearNotifications();
            if (action === "request-notification-permission") requestNotificationPermission();
            const keepMobileMenus = ["toggle-mobile-main", "toggle-mobile-sub"].includes(action);
            if (!keepMobileMenus && target.closest(".modal-root") === null && window.innerWidth <= 920) {
                byId("mainSidebar").classList.remove("open");
                byId("subSidebar").classList.remove("open");
            }
        }

        function handleInput(event) {
            const target = event.target;
            if (target.id === "globalSearch") renderSearch(target.value);
            if (target.dataset.filter === "expense-query") {
                ui.expenseQuery = target.value.toLowerCase();
                renderContent();
            }
            if (target.dataset.filter === "task-query") {
                ui.taskQuery = target.value.toLowerCase();
                renderContent();
            }
            if (target.id === "noteTitle") updateCurrentNote("title", target.value);
            if (target.id === "noteTags") updateCurrentNote("tags", target.value.split(",").map(tag => tag.trim()).filter(Boolean));
            if (target.id === "noteEditor") updateCurrentNote("content", target.innerHTML);
            if (target.id === "monthlyBudgetInput") {
                state.settings.monthlyBudget = Number(target.value || 0);
                saveState();
                renderContent();
            }
            if (target.id === "timerMinutes") {
                ui.countdownSeconds = Math.max(1, Number(target.value || 1)) * 60;
                updateClockDisplays();
            }
        }

        function handleChange(event) {
            const target = event.target;
            if (target.dataset.filter === "expense-type") {
                ui.expenseType = target.value;
                renderContent();
            }
            if (target.dataset.filter === "task-filter") {
                ui.taskFilter = target.value;
                renderContent();
            }
            if (target.id === "autoLockMinutes") {
                state.settings.autoLockMinutes = Number(target.value || 0);
                saveState();
                resetInactivityTimer();
                toast("Auto-lock updated.", "success");
            }
            if (target.id === "notificationsToggle") {
                state.settings.notifications = target.checked;
                saveState();
                toast("Notification preference saved.", "success");
            }
        }

        async function handleSubmit(event) {
            const form = event.target;
            if (!form.dataset.form) return;
            event.preventDefault();
            const data = Object.fromEntries(new FormData(form).entries());
            if (form.dataset.form === "expense") saveExpense(data, form.dataset.id);
            if (form.dataset.form === "savings") saveSavingsGoal(data);
            if (form.dataset.form === "folder") saveFolder(data, form.dataset.id);
            if (form.dataset.form === "task") saveTask(data, form.dataset.id);
            if (form.dataset.form === "habit") saveHabit(data);
            if (form.dataset.form === "prod-goal") saveProductivityGoal(data);
            if (form.dataset.form === "event") saveEvent(data, form.dataset.id);
            if (form.dataset.form === "class") saveClass(data, form.dataset.id);
            if (form.dataset.form === "alarm") saveAlarm(data);
            if (form.dataset.form === "password") await changePassword(data);
            if (form.dataset.form === "pin") await changePin(data);
            closeModal();
        }

        function handleKeyboard(event) {
            if (event.ctrlKey && event.key.toLowerCase() === "k") {
                event.preventDefault();
                byId("globalSearch").focus();
            }
            if (event.ctrlKey && event.key.toLowerCase() === "n") {
                event.preventDefault();
                quickNote();
            }
            if (event.ctrlKey && event.key.toLowerCase() === "l") {
                event.preventDefault();
                lockApp();
            }
            if (event.key === "?" && !["INPUT", "TEXTAREA"].includes(document.activeElement.tagName)) {
                byId("quickPanel").classList.toggle("open");
            }
            if (event.key === "Escape") {
                closeModal();
                byId("quickPanel").classList.remove("open");
                byId("notificationCenter").classList.remove("open");
                byId("searchResults").classList.add("hidden");
            }
        }

        function switchSection(sectionId) {

            ui.section = sectionId;
            ui.sub = section.subs[0];
            renderApp();

        function switchSub(sub) {

            renderSubSidebar();
            renderHeader();
            renderContent();

        function renderContent() {
            destroyCharts();
            const content = byId("content");

            if (ui.section === "expenses") content.innerHTML = renderExpenses();
            if (ui.section === "vault") content.innerHTML = renderVault();
            if (ui.section === "notes") content.innerHTML = renderNotes();
            if (ui.section === "tasks") content.innerHTML = renderTasks();
            if (ui.section === "productivity") content.innerHTML = renderProductivity();
            if (ui.section === "clock") content.innerHTML = renderClock();
            if (ui.section === "planner") content.innerHTML = renderPlanner();
            if (ui.section === "analytics") content.innerHTML = renderAnalytics();
            if (ui.section === "recycle") content.innerHTML = renderRecycle();
            if (ui.section === "settings") content.innerHTML = renderSettings();

        /* =========================================================
           DASHBOARD
           ========================================================= */
        function renderDashboard() {

                </div>
                <div class="grid four">

                    ${metricCard("Balance", money(metrics.balance), "fa-wallet", `${money(metrics.income)} income`, metrics.balance >= 0 ? "ok" : "danger")}
                    ${metricCard("Productivity", `${metrics.productivity}%`, "fa-fire", `${metrics.streak} day study streak`, "warn")}

        function metricCard(title, value, icon, subtitle, tone) {
            return `
                <div class="card">
                    <div class="between">
                        <span class="tag ${tone}"><i class="fa-solid ${icon}"></i> ${title}</span>
                    </div>
                    <div class="metric">${value}</div>
                    <div class="muted">${subtitle}</div>
                </div>
            `;
        }

        function getMetrics() {
            const tx = monthlyTransactions();
            const income = tx.filter(item => item.type === "income").reduce((sum, item) => sum + Number(item.amount), 0);
            const expense = tx.filter(item => item.type === "expense").reduce((sum, item) => sum + Number(item.amount), 0);
            const todayTasks = state.tasks.filter(task => task.due === today());
            const done = state.tasks.filter(task => task.completed).length;
            const productivity = state.tasks.length ? Math.round(done / state.tasks.length * 60 + Math.min(40, state.focusSessions.length * 5)) : Math.min(100, state.focusSessions.length * 10);
            return {
                income,
                expense,
                balance: income - expense,
                todayTotal: todayTasks.length,
                todayDone: todayTasks.filter(task => task.completed).length,
                productivity: clamp(productivity, 0, 100),
                weeklyCompletion: weeklyTaskCompletion(),
                streak: studyStreak(),
                storageKb: Math.round(JSON.stringify(state.files).length / 1024)
            };
        }

        function monthlyTransactions() {
            const month = today().slice(0, 7);
            return state.expenses.filter(item => item.date && item.date.startsWith(month));
        }

                    <button class="icon-btn" data-action="toggle-task" data-id="${task.id}" title="Toggle"><i class="fa-solid ${task.completed ? "fa-rotate-left" : "fa-check"}"></i></button>

            `;

            return `

                    <div class="list-main">

                        <span class="tiny">${item.start} - ${item.end} - ${escapeHtml(item.room)} - ${escapeHtml(item.teacher)}</span>

           EXPENSE MANAGER

        function renderExpenses() {

        function expenseForm(expense = {}) {
            return `
                <form class="form-grid" data-form="expense" data-id="${expense.id || ""}">
                    <input name="title" placeholder="Title" value="${escapeHtml(expense.title || "")}" required>
                    <select name="type">

                        <option value="income" ${expense.type === "income" ? "selected" : ""}>Income</option>
                    </select>

                    <select name="category">

                        <button class="ghost-btn" type="reset"><i class="fa-solid fa-rotate-left"></i> Reset</button>
                    </div>
                </form>
            `;
        }

        function saveExpense(data, id) {
            const payload = { ...data, amount: Number(data.amount || 0), createdAt: nowIso() };
            if (id) {
                const index = state.expenses.findIndex(item => item.id === id);
                state.expenses[index] = { ...state.expenses[index], ...payload };
                toast("Transaction updated.", "success");
            } else {
                state.expenses.unshift({ id: uid("txn"), ...payload });
                toast("Transaction saved.", "success");
            }
            saveState();
            renderContent();
        }

        function renderExpenseHistory() {
            let filtered = state.expenses.filter(item => {
                const text = `${item.title} ${item.category} ${item.note}`.toLowerCase();
                const typeOk = ui.expenseType === "all" || item.type === ui.expenseType;
                return text.includes(ui.expenseQuery) && typeOk;
            });
            return `
                <div class="card">
                    <div class="card-head">
                        <h3>Expense History</h3>
                        <div class="actions">
                            <button class="pill-btn" data-action="export-expenses"><i class="fa-solid fa-file-export"></i> Export CSV</button>
                            <button class="primary-btn" data-action="quick-expense"><i class="fa-solid fa-plus"></i> Add</button>

                        <input data-filter="expense-query" value="${escapeHtml(ui.expenseQuery)}" placeholder="Search expenses...">

        /* =========================================================
           PERSONAL VAULT
           ========================================================= */
        function renderVault() {
            const folder = state.folders.find(item => item.id === ui.selectedFolder) || state.folders[0];
            const childFolders = state.folders.filter(item => item.parentId === folder.id);
            let files = state.files.filter(file => file.folderId === folder.id);
            if (ui.sub === "Images") files = state.files.filter(file => file.type.startsWith("image/"));
            if (ui.sub === "Documents") files = state.files.filter(file => !file.type.startsWith("image/"));
            if (ui.sub === "Favorites") files = state.files.filter(file => file.favorite);
            if (ui.sub === "Downloads") files = state.files.slice().sort((a, b) => String(b.createdAt).localeCompare(a.createdAt));
            return `
                <div class="grid two">
                    <div class="card">
                        <div class="card-head">
                            <h3>${escapeHtml(folder.name)}</h3>
                            <div class="actions">
