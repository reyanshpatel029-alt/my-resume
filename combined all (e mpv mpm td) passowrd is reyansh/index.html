                                <button class="primary-btn" data-action="upload-files"><i class="fa-solid fa-upload"></i> Upload</button>
                            </div>
                        </div>
                        <div id="dropZone" class="drop-zone">
                            <div>
                                <i class="fa-solid fa-cloud-arrow-up" style="font-size:2rem;color:var(--accent);"></i>
                                <p><strong>Drop PDFs, images, documents, ZIPs, or backups here</strong></p>
                                <span class="muted">Files are encoded with FileReader and stored locally in this browser.</span>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-head"><h3>Folder Tools</h3><span class="tag">${state.folders.length} folders</span></div>
                        <div class="actions">
                            <button class="ghost-btn" data-action="open-folder" data-id="root"><i class="fa-solid fa-house"></i> Root</button>
                            ${folder.id !== "root" ? `<button class="ghost-btn" data-action="rename-folder" data-id="${folder.id}"><i class="fa-solid fa-pen"></i> Rename</button>` : ""}
                            ${folder.id !== "root" ? `<button class="danger-btn" data-action="delete-folder" data-id="${folder.id}"><i class="fa-solid fa-trash"></i> Delete</button>` : ""}
                        </div>
                        <p class="muted">Drag files onto folders to organize. Locked folders require your password or PIN.</p>
                    </div>
                </div>
                <div class="card" style="margin-top:14px;">
                    <div class="card-head"><h3>Folders</h3><span class="tiny">Color-coded, pinned, favorite, private</span></div>
                    <div class="vault-grid">
                        ${childFolders.map(folderCard).join("") || emptyState("fa-folder", "No subfolders here.")}
                    </div>
                </div>
                <div class="card" style="margin-top:14px;">
                    <div class="card-head"><h3>Files</h3><span class="tag accent">${files.length} items</span></div>
                    <div class="vault-grid">
                        ${files.map(fileCard).join("") || emptyState("fa-file-arrow-up", "No files in this view.")}
                    </div>
                </div>
            `;
        }

        function folderCard(folder) {
            return `
                <div class="folder-card" draggable="true" data-folder-drop="${folder.id}" style="--folder-color:${folder.color};">
                    <button class="folder-icon" data-action="open-folder" data-id="${folder.id}"><i class="fa-solid ${folder.locked ? "fa-lock" : "fa-folder"}"></i></button>
                    <div>
                        <strong class="truncate">${folder.pinned ? '<i class="fa-solid fa-thumbtack"></i> ' : ""}${escapeHtml(folder.name)}</strong>
                        <span class="tiny">${folder.favorite ? "Favorite - " : ""}${folder.locked ? "Private" : "Open"}</span>
                    </div>
                    <div class="actions">
                        <button class="icon-btn" data-action="toggle-folder-prop" data-prop="favorite" data-id="${folder.id}" title="Favorite"><i class="fa-solid fa-star"></i></button>
                        <button class="icon-btn" data-action="toggle-folder-prop" data-prop="pinned" data-id="${folder.id}" title="Pin"><i class="fa-solid fa-thumbtack"></i></button>
                        <button class="icon-btn" data-action="toggle-folder-prop" data-prop="locked" data-id="${folder.id}" title="Lock"><i class="fa-solid fa-lock"></i></button>
                    </div>
                </div>
            `;
        }

        function fileCard(file) {
            return `
                <div class="file-card" draggable="true" data-file-id="${file.id}">
                    <div class="file-icon"><i class="fa-solid ${fileIconClass(file.type)}"></i></div>
                    <div>
                        <strong class="truncate">${escapeHtml(file.name)}</strong>
                        <span class="tiny">${formatBytes(file.size)} - ${file.type || "file"}</span>
                    </div>
                    <div class="actions">
                        <button class="icon-btn" data-action="preview-file" data-id="${file.id}" title="Preview"><i class="fa-solid fa-eye"></i></button>
                        <button class="icon-btn" data-action="download-file" data-id="${file.id}" title="Download"><i class="fa-solid fa-download"></i></button>
                        <button class="icon-btn" data-action="delete-file" data-id="${file.id}" title="Delete"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `;
        }

        async function openFolder(id) {
            const folder = state.folders.find(item => item.id === id);
            if (!folder) return;
            if (folder.locked) {
                const secret = prompt("Enter password or PIN to unlock this private folder:");
                if (!secret) return;
                const hash = await hashText(secret);
                if (hash !== state.auth.passwordHash && hash !== state.auth.pinHash) {
                    toast("Folder lock denied.", "error");
                    return;
                }
            }
            ui.selectedFolder = id;
            renderContent();
        }

        function openFolderModal(id) {
            const folder = id ? state.folders.find(item => item.id === id) : {};
            openModal(`
                <h3>${id ? "Rename Folder" : "Create Folder"}</h3>
                <form class="form-grid" data-form="folder" data-id="${id || ""}">
                    <input name="name" placeholder="Folder name" value="${escapeHtml(folder.name || "")}" required>
                    <input name="color" type="color" value="${folder.color?.match(/#[0-9a-fA-F]{6}/)?.[0] || "#44c7ff"}">
                    <label class="checkline"><input name="favorite" type="checkbox" ${folder.favorite ? "checked" : ""}> Favorite</label>
                    <label class="checkline"><input name="locked" type="checkbox" ${folder.locked ? "checked" : ""}> Lock folder</label>
                    <button class="primary-btn full" type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Folder</button>
                </form>
            `);
        }

        function saveFolder(data, id) {
            const payload = {
                name: data.name,
                color: `linear-gradient(135deg, ${data.color || "#44c7ff"}, #77f2c1)`,
                favorite: data.favorite === "on",
                locked: data.locked === "on"
            };
            if (id) {
                Object.assign(state.folders.find(item => item.id === id), payload);
                toast("Folder updated.", "success");
            } else {
                state.folders.push({ id: uid("folder"), parentId: ui.selectedFolder, pinned: false, createdAt: nowIso(), ...payload });
                toast("Folder created.", "success");
            }
            saveState();
            renderContent();
        }

        function toggleFolderProp(id, prop) {
            const folder = state.folders.find(item => item.id === id);
            if (!folder || folder.id === "root") return;
            folder[prop] = !folder[prop];
            saveState();
            renderContent();
        }

        function deleteFolder(id) {
            if (!confirm("Move this folder and its files to the recycle bin?")) return;
            const ids = collectFolderIds(id);
            for (const folderId of ids) {
                const folder = state.folders.find(item => item.id === folderId);
                if (folder) moveToRecycle("folders", folderId, folder);
                state.files.filter(file => file.folderId === folderId).forEach(file => moveToRecycle("files", file.id, file));
            }
            state.folders = state.folders.filter(item => !ids.includes(item.id));
            state.files = state.files.filter(file => !ids.includes(file.folderId));
            ui.selectedFolder = "root";
            saveState();
            toast("Folder moved to recycle bin.", "success");
            renderContent();
        }

        function collectFolderIds(id) {
            const ids = [id];
            state.folders.filter(folder => folder.parentId === id).forEach(child => ids.push(...collectFolderIds(child.id)));
            return ids;
        }

        function uploadFiles(files) {
            Array.from(files || []).forEach(file => {
                const reader = new FileReader();
                reader.onload = () => {
                    state.files.push({
                        id: uid("file"),
                        folderId: ui.selectedFolder,
                        name: file.name,
                        type: file.type || "application/octet-stream",
                        size: file.size,
                        dataUrl: reader.result,
                        favorite: false,
                        createdAt: nowIso()
                    });
                    saveState();
                    renderContent();
                    toast(`Uploaded ${file.name}.`, "success");
                };
                reader.readAsDataURL(file);
            });
            byId("vaultUploader").value = "";
        }

        function previewFile(id) {
            const file = state.files.find(item => item.id === id);
            if (!file) return;
            const preview = file.type.startsWith("image/")
                ? `<img src="${file.dataUrl}" alt="${escapeHtml(file.name)}" style="max-width:100%;border-radius:16px;">`
                : file.type === "application/pdf"
                    ? `<iframe src="${file.dataUrl}" style="width:100%;height:70vh;border:1px solid var(--border);border-radius:16px;"></iframe>`
                    : `<div class="empty"><div><i class="fa-solid ${fileIconClass(file.type)}"></i><p>Preview is not available for this type.</p><button class="primary-btn" data-action="download-file" data-id="${file.id}"><i class="fa-solid fa-download"></i> Download</button></div></div>`;
            openModal(`
                <div class="between"><h3>${escapeHtml(file.name)}</h3><button class="icon-btn" data-action="close-modal"><i class="fa-solid fa-xmark"></i></button></div>
                <p class="muted">${formatBytes(file.size)} - ${file.type}</p>
                ${preview}
            `);
        }

        function downloadFile(id) {
            const file = state.files.find(item => item.id === id);
            if (!file) return;
            const link = document.createElement("a");
            link.href = file.dataUrl;
            link.download = file.name;
            link.click();
        }

        function wireDragAndDrop() {
            const zone = byId("dropZone");
            if (zone) {
                ["dragenter", "dragover"].forEach(type => zone.addEventListener(type, event => {
                    event.preventDefault();
                    zone.classList.add("drag");
                }));
                ["dragleave", "drop"].forEach(type => zone.addEventListener(type, event => {
                    event.preventDefault();
                    zone.classList.remove("drag");
                }));
                zone.addEventListener("drop", event => uploadFiles(event.dataTransfer.files));
            }
            $$("[data-file-id]").forEach(card => {
                card.addEventListener("dragstart", event => event.dataTransfer.setData("lifeos-file", card.dataset.fileId));
            });
            $$("[data-folder-drop]").forEach(folder => {
                folder.addEventListener("dragover", event => event.preventDefault());
                folder.addEventListener("drop", event => {
                    event.preventDefault();
                    const fileId = event.dataTransfer.getData("lifeos-file");
                    const file = state.files.find(item => item.id === fileId);
                    if (file) {
                        file.folderId = folder.dataset.folderDrop;
                        saveState();
                        renderContent();
                        toast("File moved.", "success");
                    }
                });
            });
            $$("[data-class-id]").forEach(card => card.addEventListener("dragstart", event => event.dataTransfer.setData("lifeos-class", card.dataset.classId)));
            $$("[data-day-drop]").forEach(day => {
                day.addEventListener("dragover", event => event.preventDefault());
                day.addEventListener("drop", event => {
                    const classId = event.dataTransfer.getData("lifeos-class");
                    const item = state.timetable.find(entry => entry.id === classId);
                    if (item) {
                        item.day = day.dataset.dayDrop;
                        saveState();
                        renderContent();
                        toast("Class moved.", "success");
                    }
                });
            });
        }

        function fileIconClass(type) {
            if (type.startsWith("image/")) return "fa-file-image";
            if (type.includes("pdf")) return "fa-file-pdf";
            if (type.includes("zip") || type.includes("compressed")) return "fa-file-zipper";
            if (type.includes("word") || type.includes("document")) return "fa-file-word";
            return "fa-file";
        }

        function fileIcon(type) {
            return `<i class="fa-solid ${fileIconClass(type)}"></i>`;
        }

        function formatBytes(bytes) {
            if (!bytes) return "0 B";
            const units = ["B", "KB", "MB", "GB"];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return `${(bytes / Math.pow(1024, i)).toFixed(i ? 1 : 0)} ${units[i]}`;
        }

        /* =========================================================
           NOTES SYSTEM
           ========================================================= */
        function renderNotes() {
            if (!ui.selectedNote && state.notes.length) ui.selectedNote = state.notes[0].id;
            if (ui.sub === "Drawing Canvas") return renderDrawing();
            if (ui.sub === "Voice Notes") return renderVoiceNotes();
            const notes = state.notes
                .filter(note => ui.sub !== "Favorites" || note.favorite)
                .sort((a, b) => Number(b.pinned) - Number(a.pinned) || String(b.updatedAt).localeCompare(a.updatedAt));
            const current = state.notes.find(note => note.id === ui.selectedNote) || notes[0];
            return `
                <div class="grid" style="grid-template-columns:minmax(220px,320px) minmax(0,1fr);">
                    <div class="card">
                        <div class="card-head">
                            <h3>Notes</h3>
                            <button class="icon-btn" data-action="new-note" title="New note"><i class="fa-solid fa-plus"></i></button>
                        </div>
                        <div class="list">
                            ${notes.map(note => `
                                <button class="note-card ${current?.id === note.id ? "active" : ""}" data-action="select-note" data-id="${note.id}">
                                    <div>
                                        <strong class="truncate">${note.pinned ? '<i class="fa-solid fa-thumbtack"></i> ' : ""}${escapeHtml(note.title)}</strong>
                                        <span class="tiny">${fmtDate(note.updatedAt)} - ${(note.tags || []).join(", ") || "no tags"}</span>
                                    </div>
                                    <span class="tiny">${stripHtml(note.content).slice(0, 82)}</span>
                                </button>
                            `).join("") || emptyState("fa-note-sticky", "No notes yet.")}
                        </div>
                    </div>
                    <div class="card">
                        ${current ? renderEditor(current) : emptyState("fa-pen", "Create a note to start writing.")}
                    </div>
                </div>
            `;
        }

        function renderEditor(note) {
            const words = stripHtml(note.content).trim().split(/\s+/).filter(Boolean).length;
            const chars = stripHtml(note.content).length;
            return `
                <div class="card-head">
                    <h3>Rich Text Editor</h3>
                    <div class="actions">
                        <button class="icon-btn" data-action="toggle-note-prop" data-prop="favorite" data-id="${note.id}" title="Favorite"><i class="fa-solid fa-star"></i></button>
                        <button class="icon-btn" data-action="toggle-note-prop" data-prop="pinned" data-id="${note.id}" title="Pin"><i class="fa-solid fa-thumbtack"></i></button>

                    </div>

                <div class="form-grid" style="margin-bottom:12px;">

                    <input id="noteTags" value="${escapeHtml((note.tags || []).join(", "))}" placeholder="Tags separated by commas">
                </div>
                <div class="editor-toolbar">
                    ${editorButton("bold", "fa-bold")}
                    ${editorButton("italic", "fa-italic")}
                    ${editorButton("underline", "fa-underline")}
                    ${editorButton("backColor", "fa-highlighter", "#ffd166")}
                    ${editorButton("formatBlock", "fa-heading", "H2")}
                    ${editorButton("insertUnorderedList", "fa-list-ul")}
                    ${editorButton("insertOrderedList", "fa-list-ol")}
                    ${editorButton("formatBlock", "fa-code", "PRE")}

                </div>
                <div id="noteEditor" class="editor" contenteditable="true">${note.content}</div>
                <div class="between" style="margin-top:12px;">
                    <span class="tiny">Auto-saved - last edited ${fmtDate(note.updatedAt)}</span>
                    <span class="tag">${words} words - ${chars} chars</span>
                </div>
            `;
        }

        function editorButton(command, icon, value = "") {
            return `<button class="icon-btn" data-action="format-note" data-command="${command}" data-value="${value}" title="${command}"><i class="fa-solid ${icon}"></i></button>`;
        }

        function createNote() {
            const note = { id: uid("note"), title: "Untitled Note", content: "<p></p>", tags: [], favorite: false, pinned: false, createdAt: nowIso(), updatedAt: nowIso() };
            state.notes.unshift(note);
            ui.selectedNote = note.id;
            saveState();
            toast("New note created.", "success");
            ui.section = "notes";
            ui.sub = "Editor";
            renderApp();
        }

        function selectNote(id) {
            ui.selectedNote = id;
            ui.section = "notes";
            if (ui.sub !== "Favorites") ui.sub = "Editor";
            renderApp();
        }

        function updateCurrentNote(key, value) {
            const note = state.notes.find(item => item.id === ui.selectedNote);
            if (!note) return;
            note[key] = value;
            note.updatedAt = nowIso();
            saveState();
            const tag = $(".card .tag");
            if (tag && key === "content") tag.textContent = `${stripHtml(value).trim().split(/\s+/).filter(Boolean).length} words - ${stripHtml(value).length} chars`;
        }

        function toggleNoteProp(id, prop) {
            const note = state.notes.find(item => item.id === id);
            if (!note) return;
            note[prop] = !note[prop];
            note.updatedAt = nowIso();
            saveState();
            renderContent();
        }

        function formatNote(command, value) {
            byId("noteEditor")?.focus();
            document.execCommand(command, false, value || null);
            updateCurrentNote("content", byId("noteEditor").innerHTML);
        }

        function startVoiceNote() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) {
                toast("Speech recognition is not available in this browser.", "error");
                return;
            }
            const recognition = new Recognition();
            recognition.lang = "en-US";
            recognition.onresult = event => {
                const text = Array.from(event.results).map(result => result[0].transcript).join(" ");
                document.execCommand("insertText", false, text);
                updateCurrentNote("content", byId("noteEditor").innerHTML);
                toast("Voice note added.", "success");
            };
            recognition.start();
            toast("Listening for voice note...", "success");
        }

        function renderVoiceNotes() {
            return `

        function initDrawingCanvas() {
            const canvas = byId("drawingCanvas");
            if (!canvas || canvas.dataset.ready) return;
            canvas.dataset.ready = "true";
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            let drawing = false;
            const point = event => {
                const rect = canvas.getBoundingClientRect();
                const touch = event.touches?.[0] || event;
                return { x: (touch.clientX - rect.left) * (canvas.width / rect.width), y: (touch.clientY - rect.top) * (canvas.height / rect.height) };
            };
            const start = event => {
                drawing = true;
                const p = point(event);
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
            };
            const move = event => {
                if (!drawing) return;
                event.preventDefault();
                const p = point(event);
                ctx.lineWidth = Number(byId("brushSize").value);
                ctx.strokeStyle = byId("brushColor").value;
                ctx.lineCap = "round";
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
            };
            const end = () => drawing = false;
            canvas.addEventListener("mousedown", start);
            canvas.addEventListener("mousemove", move);
            window.addEventListener("mouseup", end);
            canvas.addEventListener("touchstart", start, { passive: false });
            canvas.addEventListener("touchmove", move, { passive: false });
            canvas.addEventListener("touchend", end);
        }

        function clearDrawing() {
            const canvas = byId("drawingCanvas");
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

                    <input name="date" type="date" value="${event.date || today()}" required>
                    <input name="time" type="time" value="${event.time || "09:00"}">
                    <input class="full" name="note" placeholder="Notes" value="${escapeHtml(event.note || "")}">
                    <button class="primary-btn full" type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Event</button>
                </form>
            `;
        }

        function renderCalendar() {
            const date = new Date();
            const year = date.getFullYear();
            const month = date.getMonth();
            const first = new Date(year, month, 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const blanks = first.getDay();
            let cells = [];
            for (let i = 0; i < blanks; i++) cells.push(`<div class="calendar-cell muted"> </div>`);
            for (let day = 1; day <= daysInMonth; day++) {
                const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
                const events = state.events.filter(event => event.date === key);
                cells.push(`
                    <div class="calendar-cell ${key === today() ? "today" : ""}">
                        <strong>${day}</strong>
                        ${events.map(event => `<div class="tag warn" style="margin-top:6px;">${escapeHtml(event.title)}</div>`).join("")}
                    </div>
                `);
            }
            return `<div class="card"><div class="card-head"><h3>${date.toLocaleDateString(undefined, { month: "long", year: "numeric" })}</h3></div><div class="calendar">${cells.join("")}</div></div>`;
        }

        function renderTimetable() {
            return `
                <div class="card">
                    <div class="card-head"><h3>Timetable Manager</h3><button class="primary-btn" onclick="openClassModal()"><i class="fa-solid fa-plus"></i> Add Class</button></div>
                    <div class="timetable-grid">
                        ${DAYS.map(day => `
                            <div class="day-column" data-day-drop="${day}">
                                <div class="between"><strong>${day}</strong><span class="tag">${state.timetable.filter(item => item.day === day).length}</span></div>
                                ${state.timetable.filter(item => item.day === day).sort((a,b)=>a.start.localeCompare(b.start)).map(item => `
                                    <div class="class-card" draggable="true" data-class-id="${item.id}" style="--class-color:${item.color};">
                                        <strong>${escapeHtml(item.subject)}</strong>
                                        <div class="tiny">${item.start}-${item.end}</div>
                                        <div class="tiny">${escapeHtml(item.room)} - ${escapeHtml(item.teacher)}</div>
                                        <div class="actions" style="margin-top:8px;">
                                            <button class="icon-btn" data-action="edit-class" data-id="${item.id}"><i class="fa-solid fa-pen"></i></button>
                                            <button class="icon-btn" data-action="delete-class" data-id="${item.id}"><i class="fa-solid fa-trash"></i></button>
                                        </div>
                                    </div>
                                `).join("")}

                        `).join("")}
                    </div>
                </div>
            `;
        }

        function classForm(item = {}) {
            return `
                <form class="form-grid" data-form="class" data-id="${item.id || ""}">
                    <input name="subject" placeholder="Subject" value="${escapeHtml(item.subject || "")}" required>
                    <select name="day">${DAYS.map(day => `<option ${item.day === day ? "selected" : ""}>${day}</option>`).join("")}</select>
                    <input name="start" type="time" value="${item.start || "09:00"}" required>
                    <input name="end" type="time" value="${item.end || "10:00"}" required>
                    <input name="room" placeholder="Room number" value="${escapeHtml(item.room || "")}">
                    <input name="teacher" placeholder="Teacher name" value="${escapeHtml(item.teacher || "")}">
                    <input name="color" type="color" value="${item.color?.match(/#[0-9a-fA-F]{6}/)?.[0] || "#44c7ff"}">
                    <button class="primary-btn" type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Class</button>
                </form>
            `;
        }

        function saveEvent(data, id) {
            const payload = { ...data };
            if (id) Object.assign(state.events.find(item => item.id === id), payload);
            else state.events.push({ id: uid("event"), ...payload });
            saveState();
            toast("Event saved.", "success");
            renderContent();
        }

        function openEventModal(id) {
            openModal(`<h3>Edit Event</h3>${eventForm(itemById("events", id))}`);
        }

        function saveClass(data, id) {
            const payload = { ...data, color: `${data.color}33` };
            if (id) Object.assign(state.timetable.find(item => item.id === id), payload);
            else state.timetable.push({ id: uid("class"), ...payload });
            saveState();
            toast("Class saved.", "success");
            renderContent();
        }

        function openClassModal(id) {
            openModal(`<h3>${id ? "Edit" : "Add"} Class</h3>${classForm(id ? itemById("timetable", id) : {})}`);
        }

        function currentClassCard() {
            const classes = state.timetable.filter(item => item.day === currentDayName()).sort((a, b) => a.start.localeCompare(b.start));
            const minutesNow = new Date().getHours() * 60 + new Date().getMinutes();
            const current = classes.find(item => toMinutes(item.start) <= minutesNow && toMinutes(item.end) >= minutesNow);
            const next = classes.find(item => toMinutes(item.start) > minutesNow);
            return `
                ${current ? `<div class="list-item"><div><strong>Current: ${escapeHtml(current.subject)}</strong><div class="tiny">${current.start}-${current.end} - ${current.room}</div></div></div>` : `<div class="list-item"><span class="muted">No current class</span></div>`}
                ${next ? `<div class="list-item"><div><strong>Next: ${escapeHtml(next.subject)}</strong><div class="tiny">${next.start}-${next.end} - ${next.room}</div></div></div>` : `<div class="list-item"><span class="muted">No more classes today</span></div>`}
                <div class="list" style="margin-top:10px;">${classes.map(classMini).join("") || emptyState("fa-calendar-day", "No classes today.")}</div>
            `;
        }

        function toMinutes(time) {
            const [h, m] = String(time).split(":").map(Number);
            return h * 60 + m;
        }

        /* =========================================================
           ANALYTICS
           ========================================================= */
        function renderAnalytics() {
            const metrics = getMetrics();
            return `
                <div class="grid four">
                    ${metricCard("Productivity", `${metrics.productivity}%`, "fa-chart-line", "Composite score", "accent")}
                    ${metricCard("Task Completion", `${weeklyTaskCompletion()}%`, "fa-list-check", "This week", "ok")}
                    ${metricCard("Study Streak", metrics.streak, "fa-fire", "Consecutive days", "warn")}
                    ${metricCard("Storage", `${metrics.storageKb} KB`, "fa-database", "Local vault", "accent")}
                </div>
                <div class="grid two" style="margin-top:14px;">
                    <div class="card"><div class="card-head"><h3>Productivity Graph</h3></div><canvas id="analyticsProductivity"></canvas></div>
                    <div class="card"><div class="card-head"><h3>Task Completion</h3></div><canvas id="analyticsTasks"></canvas></div>
                    <div class="card"><div class="card-head"><h3>Expense Categories</h3></div><canvas id="analyticsExpenses"></canvas></div>
                    <div class="card"><div class="card-head"><h3>Storage Usage</h3></div><canvas id="analyticsStorage"></canvas></div>
                </div>
            `;
        }

        function weeklyTaskCompletion() {
            const start = new Date();
            start.setDate(start.getDate() - 6);
            const tasks = state.tasks.filter(task => !task.due || new Date(task.due) >= start);
            return tasks.length ? Math.round(tasks.filter(task => task.completed).length / tasks.length * 100) : 0;
        }

        function studyStreak() {
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const key = date.toISOString().slice(0, 10);
                const active = state.focusSessions.some(s => s.date === key) || state.tasks.some(t => t.completed && (t.completedAt || t.due || "").startsWith(key));
                if (active) streak++;
                else if (i > 0) break;
            }
            return streak;
        }

        /* =========================================================
           RECYCLE BIN
           ========================================================= */
        function renderRecycle() {
            const items = state.recycle.slice().sort((a, b) => b.deletedAt.localeCompare(a.deletedAt));
            return `
                <div class="card">
                    <div class="card-head">
                        <h3>Recycle Bin</h3>
                        <button class="danger-btn" data-action="empty-recycle"><i class="fa-solid fa-trash-can"></i> Empty Bin</button>
                    </div>
                    <div class="list">${items.length ? items.map(item => `
                        <div class="list-item">
                            <div class="list-main">
                                <strong>${escapeHtml(item.label)}</strong>
                                <span class="tiny">${item.type} - deleted ${fmtDate(item.deletedAt)}</span>
                            </div>
                            <div class="actions">
                                <button class="pill-btn" data-action="restore-item" data-id="${item.recycleId}"><i class="fa-solid fa-rotate-left"></i> Restore</button>
                                <button class="icon-btn" data-action="permanent-delete" data-id="${item.recycleId}"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `).join("") : emptyState("fa-recycle", "Recycle bin is empty.")}</div>
                </div>
            `;
        }

        function softDelete(collection, id, message) {
            const index = state[collection].findIndex(item => item.id === id);
            if (index < 0) return;
            const [item] = state[collection].splice(index, 1);
            moveToRecycle(collection, id, item);
            saveState();
            toast(message || "Moved to recycle bin.", "success");
            renderApp();
        }

        function moveToRecycle(type, originalId, item) {
            state.recycle.push({
                recycleId: uid("recycle"),
                type,
                originalId,
                label: item.title || item.name || item.subject || item.label || "Deleted item",
                item,
                deletedAt: nowIso()
            });
        }

        function restoreItem(recycleId) {
            const index = state.recycle.findIndex(item => item.recycleId === recycleId);
            if (index < 0) return;
            const [entry] = state.recycle.splice(index, 1);
            state[entry.type] ||= [];
            state[entry.type].push(entry.item);
            saveState();
            toast("Item restored.", "success");
            renderContent();
        }

        function permanentDelete(recycleId) {
            state.recycle = state.recycle.filter(item => item.recycleId !== recycleId);
            saveState();
            toast("Item permanently deleted.", "success");
            renderContent();
        }

        function emptyRecycle() {
            if (!confirm("Permanently delete all recycled items?")) return;
            state.recycle = [];
            saveState();
            toast("Recycle bin emptied.", "success");
            renderContent();
        }

        /* =========================================================
           SETTINGS, BACKUP, AND SECURITY
           ========================================================= */
        function renderSettings() {
            if (ui.sub === "Password") return renderPasswordSettings();
            if (ui.sub === "Notifications") return renderNotificationSettings();
            if (ui.sub === "Backup") return renderBackupSettings();
            if (ui.sub === "Reset") return renderResetSettings();
            return `
                <div class="grid two">
                    <div class="card">
                        <div class="card-head"><h3>Theme</h3><span class="tag">${state.settings.theme}</span></div>
                        <button class="primary-btn" data-action="toggle-theme"><i class="fa-solid fa-circle-half-stroke"></i> Toggle Dark / Light Mode</button>
                    </div>
                    <div class="card">
                        <div class="card-head"><h3>Auto-Lock</h3></div>
                        <label class="tiny">Minutes before locking after inactivity</label>
                        <input id="autoLockMinutes" type="number" min="0" value="${state.settings.autoLockMinutes}">
                    </div>
                </div>
            `;
        }

        function renderPasswordSettings() {
            return `
                <div class="grid two">
                    <div class="card">
                        <div class="card-head"><h3>Change Password</h3></div>
                        <form class="form-grid" data-form="password">
                            <input name="oldPassword" type="password" placeholder="Old password" required>
                            <input name="newPassword" type="password" placeholder="New password" required>
                            <input class="full" name="confirmPassword" type="password" placeholder="Confirm new password" required>
                            <button class="primary-btn full" type="submit"><i class="fa-solid fa-key"></i> Change Password</button>
                        </form>
                    </div>
                    <div class="card">
                        <div class="card-head"><h3>PIN Lock</h3><span class="tag ${state.auth.pinHash ? "ok" : "warn"}">${state.auth.pinHash ? "Enabled" : "Not set"}</span></div>
                        <form class="form-grid" data-form="pin">
                            <input name="password" type="password" placeholder="Current password" required>
                            <input name="pin" type="password" inputmode="numeric" placeholder="New PIN" required>
                            <button class="primary-btn full" type="submit"><i class="fa-solid fa-lock"></i> Save PIN</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderNotificationSettings() {
            return `
                <div class="card">
                    <div class="card-head"><h3>Notifications</h3><button class="ghost-btn" data-action="clear-notifications"><i class="fa-solid fa-broom"></i> Clear Center</button></div>
                    <label class="checkline"><input id="notificationsToggle" type="checkbox" ${state.settings.notifications ? "checked" : ""}> Enable toast and reminder alerts</label>
                    <div style="margin-top:14px;"><button class="primary-btn" data-action="request-notification-permission"><i class="fa-solid fa-bell"></i> Enable Browser Notifications</button></div>
                    <div class="list" style="margin-top:14px;">${state.notifications.slice(0, 12).map(notificationItem).join("") || emptyState("fa-bell", "No notifications yet.")}</div>
                </div>
            `;
        }

        function renderBackupSettings() {
            return `
                <div class="grid two">
                    <div class="card">
                        <div class="card-head"><h3>Export Backup</h3></div>
                        <p class="muted">Download all LIFE OS data as JSON. This includes notes, tasks, vault metadata, and uploaded file data URLs.</p>
                        <button class="primary-btn" data-action="export-backup"><i class="fa-solid fa-download"></i> Download Backup</button>
                    </div>
                    <div class="card">
                        <div class="card-head"><h3>Restore Backup</h3></div>
                        <p class="muted">Restore from a LIFE OS JSON backup. Current local data will be replaced after confirmation.</p>
                        <button class="ghost-btn" data-action="restore-backup"><i class="fa-solid fa-upload"></i> Restore JSON</button>
                    </div>
                </div>
            `;
        }

        function renderResetSettings() {
            return `
                <div class="card">
                    <div class="card-head"><h3>Reset LIFE OS</h3><span class="tag danger">Destructive</span></div>
                    <p class="muted">This clears all local data in this browser and returns the app to first-run setup.</p>
                    <button class="danger-btn" data-action="reset-app"><i class="fa-solid fa-triangle-exclamation"></i> Reset Everything</button>
                </div>
            `;
        }

        async function changePassword(data) {
            if (await hashText(data.oldPassword) !== state.auth.passwordHash) return toast("Old password is incorrect.", "error");
            if (data.newPassword.length < 4) return toast("New password is too short.", "error");
            if (data.newPassword !== data.confirmPassword) return toast("New passwords do not match.", "error");
            state.auth.passwordHash = await hashText(data.newPassword);
            saveState();
            toast("Password changed.", "success");
        }

        async function changePin(data) {
            if (await hashText(data.password) !== state.auth.passwordHash) return toast("Password verification failed.", "error");
            if (!/^[0-9]{4,8}$/.test(data.pin)) return toast("PIN must be 4 to 8 digits.", "error");
            state.auth.pinHash = await hashText(data.pin);
            state.auth.pinEnabled = true;
            saveState();
            toast("PIN saved.", "success");
        }

        function toggleTheme() {
            state.settings.theme = state.settings.theme === "dark" ? "light" : "dark";
            document.body.dataset.theme = state.settings.theme;
            saveState();
            renderContent();
        }

        function exportBackup() {
            downloadText(`lifeos-backup-${today()}.json`, JSON.stringify(state, null, 2), "application/json");
            toast("Backup downloaded.", "success");
        }

        function restoreBackupFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const parsed = JSON.parse(reader.result);
                    if (!confirm("Restore this backup and replace current LIFE OS data?")) return;
                    state = mergeState(defaultState(), parsed);
                    saveState();
                    toast("Backup restored.", "success");
                    renderApp();
                } catch {
                    toast("Invalid backup file.", "error");
                }
            };
            reader.readAsText(file);
            event.target.value = "";
        }

        function resetApp() {
            if (!confirm("Reset all LIFE OS data permanently?")) return;
            localStorage.removeItem(STORAGE_KEY);
            sessionStorage.removeItem(SESSION_KEY);
            state = defaultState();
            toast("App reset. Create a new password.", "warning");
            showAuth();
        }

        /* =========================================================
           NOTIFICATIONS, SEARCH, MODALS, AND UTILITIES
           ========================================================= */
        function toast(message, type = "success") {
            if (!state.settings.notifications && type !== "error") return;
            const root = byId("toastRoot");
            const div = document.createElement("div");
            div.className = "toast";
            div.innerHTML = `<div class="between"><strong>${escapeHtml(message)}</strong><span class="tag ${type === "error" ? "danger" : type === "warning" ? "warn" : "ok"}">${type}</span></div>`;
            root.appendChild(div);
            state.notifications.unshift({ id: uid("notice"), message, type, at: nowIso() });
            state.notifications = state.notifications.slice(0, 50);
            saveState();
            renderNotifications();
            setTimeout(() => div.remove(), 3200);
        }

        function renderNotifications() {
            const list = byId("notificationList");
            if (!list) return;
            list.innerHTML = state.notifications.slice(0, 10).map(notificationItem).join("") || emptyState("fa-bell", "No notifications yet.");
        }

        function notificationItem(item) {
            return `<div class="list-item"><div><strong>${escapeHtml(item.message)}</strong><div class="tiny">${fmtDate(item.at)} ${fmtTime(item.at)}</div></div><span class="tag ${item.type === "error" ? "danger" : item.type === "warning" ? "warn" : "ok"}">${item.type}</span></div>`;
        }

        function toggleNotificationCenter() {
            renderNotifications();
            byId("notificationCenter").classList.toggle("open");
        }

        function clearNotifications() {
            state.notifications = [];
            saveState();
            renderNotifications();
            renderContent();
        }

        async function requestNotificationPermission() {
            if (!("Notification" in window)) return toast("Browser notifications are unavailable.", "error");
            const permission = await Notification.requestPermission();
            toast(`Notification permission: ${permission}`, permission === "granted" ? "success" : "warning");
        }

        function renderSearch(query) {
            const box = byId("searchResults");
            const q = query.trim().toLowerCase();
            if (!q) {
                box.classList.add("hidden");
                return;
            }
            const results = [];
            state.notes.forEach(item => (`${item.title} ${stripHtml(item.content)} ${(item.tags || []).join(" ")}`.toLowerCase().includes(q)) && results.push({ id: item.id, type: "note", title: item.title, section: "notes", sub: "Editor" }));
            state.tasks.forEach(item => (`${item.title} ${item.category}`.toLowerCase().includes(q)) && results.push({ id: item.id, type: "task", title: item.title, section: "tasks", sub: "All Tasks" }));
            state.expenses.forEach(item => (`${item.title} ${item.category} ${item.note}`.toLowerCase().includes(q)) && results.push({ id: item.id, type: "expense", title: item.title, section: "expenses", sub: "Expense History" }));
            state.files.forEach(item => (`${item.name} ${item.type}`.toLowerCase().includes(q)) && results.push({ id: item.id, type: "file", title: item.name, section: "vault", sub: "Documents" }));
            state.events.forEach(item => (`${item.title} ${item.type}`.toLowerCase().includes(q)) && results.push({ id: item.id, type: "event", title: item.title, section: "planner", sub: "Events" }));
            box.innerHTML = results.slice(0, 8).map(result => `
                <button class="search-item" data-action="search-open" data-id="${result.type}:${result.id}:${result.section}:${result.sub}">
                    <strong>${escapeHtml(result.title)}</strong><div class="tiny">${result.type} - ${result.section}</div>
                </button>
            `).join("") || `<div class="empty"><div><i class="fa-solid fa-magnifying-glass"></i>No results</div></div>`;
            box.classList.remove("hidden");
        }

        function openSearchResult(payload) {
            const [type, id, section, sub] = payload.split(":");
            ui.section = section;
            ui.sub = sub;
            if (type === "note") ui.selectedNote = id;
            const file = type === "file" ? state.files.find(item => item.id === id) : null;
            if (file) ui.selectedFolder = file.folderId;
            byId("globalSearch").value = "";
            byId("searchResults").classList.add("hidden");
            renderApp();
        }

        function openModal(html) {
            byId("modalRoot").innerHTML = `<div class="modal-card">${html}<div style="margin-top:14px;"><button class="ghost-btn" data-action="close-modal"><i class="fa-solid fa-xmark"></i> Close</button></div></div>`;
            byId("modalRoot").classList.add("active");
        }

        function closeModal() {
            byId("modalRoot").classList.remove("active");
            byId("modalRoot").innerHTML = "";
        }

        function emptyState(icon, text) {
            return `<div class="empty"><div><i class="fa-solid ${icon}"></i><p>${text}</p></div></div>`;
        }

        function downloadText(filename, text, type) {
            const blob = new Blob([text], { type });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
        }

        function removeItem(collection, id, message) {
            state[collection] = (state[collection] || []).filter(item => item.id !== id);
            saveState();
            toast(message || "Deleted.", "success");
            renderContent();
        }

        function openQuickCreate() {
            openModal(`
                <h3>Quick Create</h3>
                <div class="grid three">
                    <button class="list-item" data-action="quick-note"><span><i class="fa-solid fa-note-sticky"></i> Note</span></button>
                    <button class="list-item" data-action="quick-task"><span><i class="fa-solid fa-square-check"></i> Task</span></button>
                    <button class="list-item" data-action="quick-expense"><span><i class="fa-solid fa-wallet"></i> Expense</span></button>
                </div>
            `);
        }

        function quickNote() {
            closeModal();
            createNote();
        }

        function quickTask() {
            closeModal();
            ui.section = "tasks";
            ui.sub = "Today";
            renderApp();
        }

        function quickExpense() {
            closeModal();
            ui.section = "expenses";
            ui.sub = "Add Expense";
            renderApp();
        }

        /* =========================================================
           CHARTS AND LIVE INTERVALS
           ========================================================= */
        function startIntervals() {
            stopIntervals();
            intervals.clock = setInterval(() => {
                if (ui.timerRunning) {
                    ui.timerSeconds = Math.max(0, ui.timerSeconds - 1);
                    if (ui.timerSeconds === 0) {
                        ui.timerRunning = false;
                        state.focusSessions.push({ id: uid("focus"), minutes: ui.timerMode === "focus" ? 25 : 5, date: today(), label: ui.timerMode });
                        saveState();
                        toast("Pomodoro complete.", "success");
                    }
                }
                if (ui.stopwatchRunning) ui.stopwatchSeconds++;
                if (ui.countdownRunning) {
                    ui.countdownSeconds = Math.max(0, ui.countdownSeconds - 1);
                    if (ui.countdownSeconds === 0) {
                        ui.countdownRunning = false;
                        toast("Timer finished.", "warning");
                    }
                }
                checkAlarms();
                checkReminders();
                updateClockDisplays();
            }, 1000);
        }

        function stopIntervals() {
            Object.values(intervals).forEach(clearInterval);
            intervals = {};
        }

        function updateClockDisplays() {
            const now = new Date();
            const time = now.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit", second: "2-digit" });
            ["dashClock", "digitalClock"].forEach(id => { if (byId(id)) byId(id).textContent = time; });
            if (byId("dateDisplay")) byId("dateDisplay").textContent = now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });
            if (byId("pomodoroTime")) byId("pomodoroTime").textContent = formatSeconds(ui.timerSeconds);
            if (byId("focusTime")) byId("focusTime").textContent = formatSeconds(ui.timerSeconds);
            if (byId("stopwatchDisplay")) byId("stopwatchDisplay").textContent = formatSeconds(ui.stopwatchSeconds);
            if (byId("countdownDisplay")) byId("countdownDisplay").textContent = formatSeconds(ui.countdownSeconds);
            const seconds = now.getSeconds();
            const minutes = now.getMinutes();
            const hours = now.getHours() % 12;
            if (byId("secondHand")) byId("secondHand").style.transform = `translateX(-50%) rotate(${seconds * 6}deg)`;
            if (byId("minuteHand")) byId("minuteHand").style.transform = `translateX(-50%) rotate(${minutes * 6 + seconds * 0.1}deg)`;
            if (byId("hourHand")) byId("hourHand").style.transform = `translateX(-50%) rotate(${hours * 30 + minutes * 0.5}deg)`;
            $$("[data-world-zone]").forEach(el => {
                el.textContent = now.toLocaleTimeString(undefined, { timeZone: el.dataset.worldZone, hour: "2-digit", minute: "2-digit" });
            });
        }

        function formatSeconds(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return h ? `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}` : `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        }

        function checkAlarms() {
            state.alarms ||= [];
            const key = new Date().toTimeString().slice(0, 5);
            state.alarms.forEach(alarm => {
                if (alarm.time === key && alarm.lastTriggered !== today()) {
                    alarm.lastTriggered = today();
                    saveState();
                    toast(`Alarm: ${alarm.label}`, "warning");
                    if (Notification.permission === "granted") new Notification(`LIFE OS Alarm: ${alarm.label}`);
                }
            });
        }

        function checkReminders() {
            const now = new Date();
            state.events.forEach(event => {
                if (!event.time || event.notifiedAt === today()) return;
                const due = new Date(`${event.date}T${event.time}`);
                if (Math.abs(due - now) < 60000) {
                    event.notifiedAt = today();
                    saveState();
                    toast(`Reminder: ${event.title}`, "warning");
                }
            });
        }

        function mountCharts() {
            if (!window.Chart) return;
            if (byId("dashProgressChart")) chart("dashProgressChart", "line", labels7(), taskSeries(), "Weekly completed tasks");
            if (byId("expensePie")) pieChart("expensePie", categoryTotals());
            if (byId("expenseBar")) barChart("expenseBar", ["Income", "Expense", "Balance"], [getMetrics().income, getMetrics().expense, getMetrics().balance]);
            if (byId("expenseTrend")) chart("expenseTrend", "line", monthLabels(), monthlyExpenseSeries(), "Monthly expenses");
            if (byId("budgetCategoryChart")) pieChart("budgetCategoryChart", categoryTotals());
            if (byId("focusChart")) chart("focusChart", "bar", labels7(), focusSeries(), "Focus minutes");
            if (byId("analyticsProductivity")) chart("analyticsProductivity", "line", labels7(), focusSeries(), "Focus minutes");
            if (byId("analyticsTasks")) barChart("analyticsTasks", ["Open", "Done"], [state.tasks.filter(t => !t.completed).length, state.tasks.filter(t => t.completed).length]);
            if (byId("analyticsExpenses")) pieChart("analyticsExpenses", categoryTotals());
            if (byId("analyticsStorage")) barChart("analyticsStorage", ["Notes", "Tasks", "Files", "Vault KB"], [state.notes.length, state.tasks.length, state.files.length, getMetrics().storageKb]);
        }

        function chart(id, type, labels, data, label) {
            const ctx = byId(id);
            charts[id] = new Chart(ctx, {
                type,
                data: { labels, datasets: [{ label, data, borderColor: "#44c7ff", backgroundColor: "rgba(68,199,255,0.22)", tension: 0.38, fill: true }] },
                options: chartOptions()
            });
        }

        function pieChart(id, totals) {
            charts[id] = new Chart(byId(id), {
                type: "doughnut",
                data: { labels: Object.keys(totals), datasets: [{ data: Object.values(totals), backgroundColor: ["#44c7ff", "#77f2c1", "#ffd166", "#ff6680", "#9f7aea", "#38bdf8", "#fb7185"] }] },
                options: chartOptions()
            });
        }

        function barChart(id, labels, data) {
            charts[id] = new Chart(byId(id), {
                type: "bar",
                data: { labels, datasets: [{ label: "Value", data, backgroundColor: "rgba(119,242,193,0.52)", borderColor: "#77f2c1", borderWidth: 1 }] },
                options: chartOptions()
            });
        }

        function chartOptions() {
            return {
                responsive: true,
                plugins: { legend: { labels: { color: getComputedStyle(document.body).getPropertyValue("--text") } } },
                scales: {
                    x: { ticks: { color: getComputedStyle(document.body).getPropertyValue("--muted") }, grid: { color: "rgba(255,255,255,0.08)" } },
                    y: { ticks: { color: getComputedStyle(document.body).getPropertyValue("--muted") }, grid: { color: "rgba(255,255,255,0.08)" } }
                }
            };
        }

        function destroyCharts() {
            Object.values(charts).forEach(chart => chart.destroy());
            charts = {};
        }

        function labels7() {
            return Array.from({ length: 7 }, (_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                return d.toLocaleDateString(undefined, { weekday: "short" });
            });
        }

        function taskSeries() {
            return labels7().map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                const key = d.toISOString().slice(0, 10);
                return state.tasks.filter(task => task.completed && (task.completedAt || task.due || "").startsWith(key)).length;
            });
        }

        function focusSeries() {
            return labels7().map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - (6 - i));
                const key = d.toISOString().slice(0, 10);
                return state.focusSessions.filter(session => session.date === key).reduce((sum, session) => sum + Number(session.minutes || 0), 0);
            });
        }

        function monthLabels() {
            return Array.from({ length: 6 }, (_, i) => {
                const d = new Date();
                d.setMonth(d.getMonth() - (5 - i));
                return d.toLocaleDateString(undefined, { month: "short" });
            });
        }

        function monthlyExpenseSeries() {
            return monthLabels().map((_, i) => {
                const d = new Date();
                d.setMonth(d.getMonth() - (5 - i));
                const key = d.toISOString().slice(0, 7);
                return state.expenses.filter(item => item.type === "expense" && item.date.startsWith(key)).reduce((sum, item) => sum + Number(item.amount), 0);
            });
        }

        function categoryTotals() {
            const totals = {};
            state.expenses.filter(item => item.type === "expense").forEach(item => totals[item.category] = (totals[item.category] || 0) + Number(item.amount));
            return Object.keys(totals).length ? totals : { Empty: 1 };
        }

        document.addEventListener("lifeos-route-events", () => {
            ui.section = "planner";
            ui.sub = "Events";
            renderApp();
        });
    </script>
</body>
</html>
