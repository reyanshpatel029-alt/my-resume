<!doctype html>
<html lang="en" data-page="movie">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Clone | Player</title>
    <link rel="icon" href="assets/logos/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css?v=2" />
    <link rel="stylesheet" href="css/navbar.css?v=2" />
    <link rel="stylesheet" href="css/cards.css?v=2" />
    <link rel="stylesheet" href="css/player.css?v=2" />
    <link rel="stylesheet" href="css/responsive.css?v=2" />
  </head>
  <body>
    <div class="page-loader" data-loader><span class="spinner" aria-hidden="true"></span></div>
    <header class="navbar compact" data-navbar>
      <a class="brand" href="index.html" aria-label="Netflix home"><img src="assets/logos/netflix-wordmark.svg" alt="Netflix" /></a>
      <button class="icon-button nav-toggle" data-mobile-toggle aria-label="Open menu" title="Menu"><span></span><span></span><span></span></button>
      <nav class="nav-menu" data-nav-menu aria-label="Main navigation">
        <a href="index.html" data-nav-link>Home</a>
        <a href="search.html?type=TV%20Show" data-nav-link>TV Shows</a>
        <a href="search.html?type=Movie" data-nav-link>Movies</a>
        <a href="search.html?category=trending" data-nav-link>New &amp; Popular</a>
        <a href="search.html?category=my-list" data-nav-link>My List</a>
        <a href="search.html?language=all" data-nav-link>Browse by Language</a>
      </nav>
      <div class="nav-actions">
        <a class="icon-button" href="search.html" aria-label="Search" title="Search" data-ripple><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 19.6-5.4-5.4a7.4 7.4 0 1 0-1.4 1.4L19.6 21zM4.8 10a5.2 5.2 0 1 1 10.4 0A5.2 5.2 0 0 1 4.8 10z"/></svg></a>
        <button class="icon-button" data-notifications aria-label="Notifications" title="Notifications" data-ripple><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.4-1.8H9.6A2.5 2.5 0 0 0 12 22zm7-6V11a7 7 0 0 0-5-6.7V3a2 2 0 1 0-4 0v1.3A7 7 0 0 0 5 11v5l-2 2v1h18v-1z"/></svg></button>
        <a class="profile-pill" href="profile.html" aria-label="Profiles" title="Profiles"><span data-active-avatar>R</span></a>
      </div>
    </header>

    <main class="player-page">
      <section class="player-shell reveal">
        <div class="video-wrap" data-player>
          <video id="video-player" playsinline preload="metadata" poster="">
            <source data-video-source src="" type="video/mp4" />
            <track default kind="captions" srclang="en" label="English" src="assets/videos/sample-captions.vtt" />
          </video>
          <div class="player-controls" data-controls>
            <button class="icon-button" data-play-toggle aria-label="Play" title="Play/Pause"><svg viewBox="0 0 24 24" aria-hidden="true"><path data-play-icon d="M8 5v14l11-7z"/></svg></button>
            <input class="progress-input" data-progress type="range" min="0" max="100" value="0" aria-label="Seek" />
            <span class="time-code" data-time>0:00 / 0:00</span>
            <button class="icon-button" data-mute aria-label="Mute" title="Mute"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9zM16 8.5v7a4 4 0 0 0 0-7z"/></svg></button>
            <input class="volume-input" data-volume type="range" min="0" max="1" step="0.05" value="0.85" aria-label="Volume" />
            <select data-speed aria-label="Playback speed">
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
            </select>
            <button class="icon-button" data-captions aria-label="Captions" title="Captions">CC</button>
            <button class="icon-button" data-fullscreen aria-label="Fullscreen" title="Fullscreen"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h6v2H7v4H5zm8 0h6v6h-2V7h-4zM7 13v4h4v2H5v-6zm10 4v-4h2v6h-6v-2z"/></svg></button>
          </div>
        </div>
        <div class="player-details">
          <h1 data-player-title>Loading...</h1>
          <div class="hero-meta">
            <span data-player-rating></span>
            <span data-player-year></span>
            <span class="age-rating" data-player-age></span>
            <span data-player-genre></span>
          </div>
          <p data-player-description></p>
        </div>
      </section>
      <section class="content-band" id="recommended-row" aria-label="Similar Movies"></section>
    </main>

    <div class="modal" data-modal aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="icon-button modal-close" data-modal-close aria-label="Close" title="Close"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18.3 5.7-1.4-1.4L12 9.2 7.1 4.3 5.7 5.7l4.9 4.9-4.9 4.9 1.4 1.4 4.9-4.9 4.9 4.9 1.4-1.4-4.9-4.9z"/></svg></button>
        <div class="modal-body" data-modal-body></div>
      </div>
    </div>

    <div class="toast-stack" data-toast-stack aria-live="polite"></div>
    <script src="data/movies.js?v=3"></script>
    <script src="js/bundle.js?v=3"></script>
  </body>
</html>
