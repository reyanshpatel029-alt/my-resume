<!doctype html>
<html lang="en" data-page="profile">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Clone | Profiles</title>
    <link rel="icon" href="assets/logos/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css?v=2" />
    <link rel="stylesheet" href="css/login.css?v=2" />
    <link rel="stylesheet" href="css/responsive.css?v=2" />
  </head>
  <body class="profile-body">
    <header class="login-header">
      <a class="brand" href="index.html" aria-label="Netflix home"><img src="assets/logos/netflix-wordmark.svg" alt="Netflix" /></a>
    </header>
    <main class="profile-shell">
      <h1>Who's watching?</h1>
      <div class="profiles-grid" data-profiles></div>
      <div class="profile-actions">
        <button class="button button-secondary" data-add-profile data-ripple>Add Profile</button>
        <button class="button button-ghost" data-manage-profiles data-ripple>Manage Profiles</button>
      </div>
    </main>
    <div class="toast-stack" data-toast-stack aria-live="polite"></div>
    <script src="data/movies.js?v=3"></script>
    <script src="js/bundle.js?v=3"></script>
  </body>
</html>
