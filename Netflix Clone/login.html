<!doctype html>
<html lang="en" data-page="login">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Clone | Login</title>
    <link rel="icon" href="assets/logos/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css?v=2" />
    <link rel="stylesheet" href="css/login.css?v=2" />
    <link rel="stylesheet" href="css/responsive.css?v=2" />
  </head>
  <body class="login-body">
    <header class="login-header">
      <a class="brand" href="index.html" aria-label="Netflix home"><img src="assets/logos/netflix-wordmark.svg" alt="Netflix" /></a>
    </header>
    <main class="login-shell">
      <form class="login-card" data-login-form novalidate>
        <h1>Sign In</h1>
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required />
          <small data-error="email"></small>
        </label>
        <label class="field password-field">
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" minlength="6" required />
          <button type="button" class="text-button" data-toggle-password>Show</button>
          <small data-error="password"></small>
        </label>
        <div class="form-row">
          <label class="checkbox-label"><input type="checkbox" name="remember" /> Remember me</label>
          <button type="button" class="link-button" data-forgot>Forgot Password?</button>
        </div>
        <button class="button button-primary full-width" type="submit" data-ripple>Sign In</button>
        <p class="signup-copy">New to Netflix? <button type="button" class="link-button" data-signup>Sign up now.</button></p>
      </form>
    </main>
    <div class="toast-stack" data-toast-stack aria-live="polite"></div>
    <script src="data/movies.js?v=3"></script>
    <script src="js/bundle.js?v=3"></script>
  </body>
</html>
